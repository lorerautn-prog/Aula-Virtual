<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EduSim-VR: Simulador Docente</title>
    <!-- Cargamos la librería de A-Frame para Realidad Virtual Web -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>

    <!-- <a-scene> es el contenedor de todo nuestro mundo 3D -->
    <a-scene>
        
        <!-- El cielo / fondo del simulador -->
        <a-sky color="#ECECEC"></a-sky>

        <!-- Una caja de prueba (la cambiaremos por tu salón después) -->
        <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>

        <!-- Cámara con cursor para poder interactuar y hacer clics en VR -->
        <a-entity camera look-controls position="0 1.6 0">
            <a-cursor color="#FF0000" animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"></a-cursor>
        </a-entity>

    </a-scene>

</body>
</html>
